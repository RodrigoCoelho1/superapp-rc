<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="60%" stop-color="#0d1120"/>
      <stop offset="100%" stop-color="#080b14"/>
    </radialGradient>
    <radialGradient id="orb1" cx="78%" cy="18%" r="40%">
      <stop offset="0%" stop-color="#4f8ef7" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4f8ef7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="22%" cy="82%" r="35%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="d0" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4f8ef7"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="d1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#4f8ef7"/></linearGradient>
    <linearGradient id="d2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#ec4899"/></linearGradient>
    <linearGradient id="d3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
    <linearGradient id="d4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0e8ff"/><stop offset="100%" stop-color="#a5b4fc"/></linearGradient>
    <linearGradient id="d5" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#14b8a6"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
    <linearGradient id="d6" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#ef4444"/></linearGradient>
    <linearGradient id="d7" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4f8ef7"/><stop offset="100%" stop-color="#14b8a6"/></linearGradient>
    <linearGradient id="d8" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <clipPath id="rr"><rect width="512" height="512" rx="112" ry="112"/></clipPath>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#orb1)"/>
  <rect width="512" height="512" rx="112" fill="url(#orb2)"/>

  <!-- 3x3 dot grid — gap=90, dotR=28, start=256-90=166 -->
  <!-- row 0 -->
  <circle cx="166" cy="166" r="28" fill="url(#d0)" opacity="0.9"/>
  <circle cx="256" cy="166" r="28" fill="url(#d1)" opacity="0.9"/>
  <circle cx="346" cy="166" r="28" fill="url(#d2)" opacity="0.9"/>
  <!-- row 1 -->
  <circle cx="166" cy="256" r="28" fill="url(#d3)" opacity="0.9"/>
  <circle cx="256" cy="256" r="28" fill="url(#d4)" opacity="0.9"/>
  <circle cx="346" cy="256" r="28" fill="url(#d5)" opacity="0.9"/>
  <!-- row 2 -->
  <circle cx="166" cy="346" r="28" fill="url(#d6)" opacity="0.9"/>
  <circle cx="256" cy="346" r="28" fill="url(#d7)" opacity="0.9"/>
  <circle cx="346" cy="346" r="28" fill="url(#d8)" opacity="0.9"/>

  <!-- shine highlights -->
  <circle cx="158" cy="158" r="11" fill="white" opacity="0.28"/>
  <circle cx="248" cy="158" r="11" fill="white" opacity="0.28"/>
  <circle cx="338" cy="158" r="11" fill="white" opacity="0.28"/>
  <circle cx="158" cy="248" r="11" fill="white" opacity="0.28"/>
  <circle cx="248" cy="248" r="11" fill="white" opacity="0.28"/>
  <circle cx="338" cy="248" r="11" fill="white" opacity="0.28"/>
  <circle cx="158" cy="338" r="11" fill="white" opacity="0.28"/>
  <circle cx="248" cy="338" r="11" fill="white" opacity="0.28"/>
  <circle cx="338" cy="338" r="11" fill="white" opacity="0.28"/>
</svg>
